<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | SecureScan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.css">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; z-index: 2;">
        <div style="text-align: center; padding: 40px;">
            <div style="width: 150px; height: 150px; background: linear-gradient(135deg, var(--warning), #f59e0b); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 30px; box-shadow: 0 0 60px var(--warning);">
                <i class="fas fa-exclamation-triangle" style="font-size: 60px; color: white;"></i>
            </div>
            <h1 style="font-size: 100px; font-weight: 800; background: linear-gradient(135deg, var(--text-primary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px;">404</h1>
            <h2 style="font-size: 32px; margin-bottom: 20px;">Page Not Found</h2>
            <p style="color: var(--text-secondary); margin-bottom: 40px; font-size: 18px;">The page you're looking for doesn't exist or has been moved.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                <i class="fas fa-home"></i> Go Home
            </a>
        </div>
    </div>
</body>
</html>
